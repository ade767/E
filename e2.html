<!DOCTYPE html>
<html lang="en">

<style>
    /* General Page Styling */
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ffccd5, #d1b3ff);
    margin: 0;
    padding: 0;
    color: #4a004a;
}

/* Header Styling */
header {
    background: linear-gradient(90deg, #ff4d6d, #b34dff);
    color: white;
    padding: 30px 0;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    border-bottom-left-radius: 20px;
    border-bottom-right-radius: 20px;
}

header h1 {
    font-size: 2.5em;
}

.highlight {
    color: #ffeb3b;
    font-size: 1.3em;
    text-shadow: 2px 2px 5px #800080;
}

/* Navigation Styling */
nav ul {
    list-style: none;
    padding: 0;
    margin: 20px 0 0 0;
    display: flex;
    justify-content: center;
    gap: 20px;
}

nav ul li {
    display: inline;
}

nav ul li a {
    text-decoration: none;
    color: white;
    padding: 10px 20px;
    border-radius: 15px;
    transition: background 0.3s, color 0.3s;
    font-weight: bold;
}

nav ul li.current a,
nav ul li a:hover {
    background: #ff99cc;
    color: #4a004a;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Section Titles */
.her h2, .he h3 {
    text-align: center;
    color: #ff3366;
    font-size: 2em;
    text-shadow: 1px 1px 5px #800080;
    margin-top: 40px;
}

/* Image Sections */
#image .me img,
#ife .love img {
    display: block;
    margin: 20px auto;
    border-radius: 20px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}

#image .me img:hover,
#ife .love img:hover {
    transform: scale(1.05) rotate(-2deg);
}

/* Love Description Section */
#you .we h1 {
    max-width: 800px;
    margin: 30px auto;
    text-align: center;
    font-size: 1.4em;
    line-height: 1.6;
    color: #330033;
    background: rgba(255, 204, 229, 0.7);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

/* "I 💖 You So Much" Section */
#five .six {
    text-align: center;
    font-size: 2em;
    color: #ff3366;
    line-height: 2.2;
    margin: 50px 0;
    font-weight: bold;
    text-shadow: 2px 2px 5px #b34dff;
}

/* Footer Styling */
footer {
    text-align: center;
    padding: 25px 10px;
    background: linear-gradient(90deg, #b34dff, #ff4d6d);
    color: white;
    font-size: 1.2em;
    box-shadow: 0 -4px 8px rgba(0,0,0,0.2);
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
}

/* Emoji Effects on Hover */
h1 span {
    display: inline-block;
    transition: transform 0.3s;
}

h1 span:hover {
    transform: scale(1.3) rotate(-10deg);
}

/* Mobile Responsiveness */
@media (max-width: 600px) {
    #you .we h1,
    #five .six {
        font-size: 1.2em;
    }

    nav ul {
        flex-direction: column;
        gap: 10px;
    }

    #image .me img,
    #ife .love img {
        width: 90%;
    }
}
    
    
</style>
</head>
